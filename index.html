<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Board Game Library - Caverns and Forests</title>
    <style>
        * {
            box-sizing: border-box;
        }

        :root {
            --primary-color: #555555;
            --primary-light: #888888;
            --secondary-color: #555555;
            --background: #dddddd;
            --card-bg: #ffffff;
            --text-primary: #333333;
            --text-secondary: #666666;
            --border-color: #cccccc;
            --shadow: 0 2px 12px rgba(0,0,0,0.15);
            --accent-yellow: #fffde9;
        }

        @import url('https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;500;600;700&display=swap');

        body {
            font-family: 'Work Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            font-weight: 500;
            background: var(--background);
            color: var(--text-primary);
            margin: 0;
            padding: 20px;
            line-height: 1.6;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        header h1 {
            color: var(--primary-light);
            margin: 0 0 10px 0;
            font-size: 2.2em;
            font-weight: 700;
        }

        header p {
            color: var(--text-secondary);
            margin: 0;
        }

        .controls {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 8px;
            box-shadow: var(--shadow);
            margin-bottom: 25px;
            border: 1px solid var(--border-color);
        }

        .controls-row {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-items: flex-end;
        }

        .control-group {
            flex: 1;
            min-width: 150px;
        }

        .control-group label {
            display: block;
            font-size: 0.85em;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .control-group input,
        .control-group select {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 1em;
            transition: border-color 0.2s;
            background: var(--card-bg);
            color: var(--text-primary);
            font-family: inherit;
        }

        .control-group input::placeholder {
            color: var(--text-secondary);
        }

        .control-group input:focus,
        .control-group select:focus {
            outline: none;
            border-color: var(--primary-light);
        }

        .filter-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid var(--border-color);
        }

        .filter-tags:empty {
            display: none;
        }

        .filter-tag {
            background: var(--card-bg);
            color: var(--text-primary);
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 0.85em;
            cursor: pointer;
            transition: background 0.2s, color 0.2s;
            border: 1px solid var(--border-color);
        }

        .filter-tag:hover {
            background: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
        }

        .filter-tag.active {
            background: var(--primary-color);
            color: white;
            font-weight: 600;
            border-color: var(--primary-color);
        }

        .stats-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .game-count {
            font-size: 1.1em;
            color: var(--text-secondary);
        }

        .game-count strong {
            color: var(--primary-color);
        }

        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 20px;
        }

        .game-card {
            position: relative;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: var(--shadow);
            transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
            aspect-ratio: 1 / 1;
            background: #1a1a1a;
        }

        .game-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 30px rgba(0,0,0,0.3);
        }

        .game-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            top: 0;
            left: 0;
        }

        .game-info {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 60px 15px 15px 15px;
            background: linear-gradient(to top, rgba(30,30,30,0.95) 0%, rgba(30,30,30,0.85) 60%, transparent 100%);
            color: white;
        }

        .game-title {
            font-size: 1.05em;
            font-weight: 600;
            margin: 0 0 8px 0;
            color: white;
            line-height: 1.3;
        }


        .game-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            font-size: 0.8em;
            color: rgba(255,255,255,0.8);
            margin-bottom: 8px;
        }

        .game-meta span {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .game-rating {
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
        }

        .rating-badge {
            background: rgba(255,255,255,0.2);
            color: white;
            padding: 2px 8px;
            border-radius: 4px;
            font-weight: 600;
            font-size: 0.85em;
        }

        .rating-badge.high {
            background: rgba(80, 80, 80, 0.9);
        }

        .rating-badge.medium {
            background: rgba(245, 124, 0, 0.9);
        }

        .rating-badge.low {
            background: rgba(211, 47, 47, 0.9);
        }

        .complexity-badge {
            background: rgba(100, 100, 100, 0.9);
            color: white;
            padding: 2px 8px;
            border-radius: 4px;
            font-weight: 600;
            font-size: 0.8em;
        }

        .game-categories {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            margin-top: 8px;
        }

        .category-tag {
            background: rgba(80, 80, 80, 0.7);
            color: rgba(255,255,255,0.95);
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.7em;
        }

        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(221,221,221,0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .hidden {
            display: none !important;
        }

        /* Game detail modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 20px;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s, visibility 0.3s;
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .modal-content {
            background: var(--card-bg);
            border-radius: 16px;
            max-width: 600px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            position: relative;
            border: 1px solid var(--border-color);
        }

        .modal-close {
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(0,0,0,0.5);
            color: white;
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

        .modal-close:hover {
            background: rgba(0,0,0,0.7);
        }

        .modal-image {
            width: 100%;
            aspect-ratio: 3 / 4;
            object-fit: cover;
            border-radius: 16px 16px 0 0;
        }

        .modal-body {
            padding: 25px;
        }

        .modal-title {
            font-size: 1.5em;
            font-weight: 700;
            margin: 0 0 15px 0;
            color: var(--text-primary);
        }

        .modal-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
        }

        .modal-meta-item {
            display: flex;
            flex-direction: column;
        }

        .modal-meta-label {
            font-size: 0.75em;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .modal-meta-value {
            font-size: 1.1em;
            font-weight: 600;
            color: var(--text-primary);
        }

        .modal-description {
            color: var(--text-secondary);
            line-height: 1.7;
            margin-bottom: 20px;
        }

        .modal-description.loading {
            font-style: italic;
            color: var(--text-secondary);
        }

        .modal-categories {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .modal-category {
            background: var(--primary-color);
            color: white;
            padding: 5px 12px;
            border-radius: 8px;
            font-size: 0.85em;
        }

        .modal-bgg-link {
            display: inline-block;
            margin-top: 20px;
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 500;
        }

        .modal-bgg-link:hover {
            text-decoration: underline;
        }

        .loading-overlay.hidden {
            display: none;
        }

        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid var(--border-color);
            border-top-color: var(--primary-light);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            margin-top: 20px;
            font-size: 1.1em;
            color: var(--secondary-color);
        }

        .error-message {
            background: rgba(198, 40, 40, 0.2);
            color: #ff8a80;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            margin: 40px 0;
            border: 1px solid rgba(198, 40, 40, 0.3);
        }

        .no-results {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }

        .no-results h3 {
            margin: 0 0 10px 0;
            color: var(--text-primary);
        }

        .last-updated {
            text-align: center;
            font-size: 0.85em;
            color: var(--text-secondary);
            margin-top: 30px;
        }

        @media (max-width: 600px) {
            body {
                padding: 15px;
            }

            header h1 {
                font-size: 1.6em;
            }

            .controls {
                padding: 15px;
            }

            .control-group {
                min-width: 100%;
            }

            .games-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">

        <div class="controls">
            <div class="controls-row">
                <div class="control-group" style="flex: 2;">
                    <label for="search">Search</label>
                    <input type="text" id="search" placeholder="Search games...">
                </div>
                <div class="control-group">
                    <label for="players">Players</label>
                    <select id="players">
                        <option value="">Any</option>
                        <option value="1">1</option>
                        <option value="2">2</option>
                        <option value="3">3</option>
                        <option value="4">4</option>
                        <option value="5">5</option>
                        <option value="6">6</option>
                        <option value="7">7</option>
                        <option value="8">8</option>
                        <option value="9">9</option>
                        <option value="10">10</option>
                        <option value="11">11</option>
                        <option value="12">12+</option>
                    </select>
                </div>
                <div class="control-group">
                    <label for="playtime">Play Time</label>
                    <select id="playtime">
                        <option value="">Any</option>
                        <option value="30">Under 30 min</option>
                        <option value="60">30-60 min</option>
                        <option value="120">1-2 hours</option>
                        <option value="999">2+ hours</option>
                    </select>
                </div>
                <div class="control-group">
                    <label for="sort">Sort By</label>
                    <select id="sort">
                        <option value="name">Name (A-Z)</option>
                        <option value="name-desc">Name (Z-A)</option>
                        <option value="year">Newest First</option>
                        <option value="playtime">Shortest First</option>
                        <option value="playtime-desc">Longest First</option>
                    </select>
                </div>
                <div class="control-group" style="flex: 0; min-width: auto;">
                    <label>&nbsp;</label>
                    <button onclick="resetFilters()" style="padding: 10px 20px; border: none; border-radius: 8px; background: #333; color: #fff; font-family: inherit; font-size: 1em; cursor: pointer;">Reset</button>
                </div>
            </div>
            <div class="filter-tags" id="categoryFilters"></div>
        </div>

        <div class="stats-bar">
            <div class="game-count">
                Showing <strong id="visibleCount">0</strong> of <strong id="totalCount">0</strong> games
            </div>
        </div>

        <div class="games-grid" id="gamesGrid"></div>

        <div class="no-results hidden" id="noResults">
            <h3>No games found</h3>
            <p>Try adjusting your filters or search term.</p>
        </div>

        <p class="last-updated" id="lastUpdated"></p>
    </div>

    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-spinner"></div>
        <p class="loading-text">Loading game library...</p>
    </div>

    <div class="modal-overlay" id="gameModal" onclick="closeModal(event)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <button class="modal-close" onclick="closeModal()">&times;</button>
            <img class="modal-image" id="modalImage" src="" alt="">
            <div class="modal-body">
                <h2 class="modal-title" id="modalTitle"></h2>
                <div class="modal-meta" id="modalMeta"></div>
                <p class="modal-description" id="modalDescription"></p>
                <div class="modal-categories" id="modalCategories"></div>
                <a class="modal-bgg-link" id="modalBggLink" href="#" target="_blank">View on BoardGameGeek</a>
            </div>
        </div>
    </div>

    <script>
        let allGames = [];
        let filteredGames = [];
        let selectedCategories = new Set();

        // Initialize the application
        document.addEventListener('DOMContentLoaded', () => {
            loadLibrary();
            setupEventListeners();
        });

        function resetFilters() {
            document.getElementById('search').value = '';
            document.getElementById('players').value = '';
            document.getElementById('playtime').value = '';
            document.getElementById('sort').value = 'name';
            selectedCategories.clear();
            renderCategoryFilters();
            applyFilters();
        }

        function setupEventListeners() {
            document.getElementById('search').addEventListener('input', debounce(applyFilters, 300));
            document.getElementById('players').addEventListener('change', applyFilters);
            document.getElementById('playtime').addEventListener('change', applyFilters);
            document.getElementById('sort').addEventListener('change', applyFilters);
        }

        function debounce(func, wait) {
            let timeout;
            return function executedFunction(...args) {
                const later = () => {
                    clearTimeout(timeout);
                    func(...args);
                };
                clearTimeout(timeout);
                timeout = setTimeout(later, wait);
            };
        }

        async function loadLibrary() {
            try {
                const response = await fetch('games.json');
                if (!response.ok) {
                    throw new Error('games.json not found');
                }
                const data = await response.json();
                allGames = data.games;

                populateFilters();
                renderGames();
                hideLoading();
                updateLastUpdated(data.lastUpdated);

                // Note: BGG blocks automated image fetching
                // Images can be added manually to games.json or via a future update
            } catch (error) {
                console.error('Error loading library:', error);
                hideLoading();
                showError(`
                    <strong>Game library not found.</strong><br><br>
                    Run this command to generate it:<br>
                    <code style="background: #f5f5f5; padding: 10px; display: block; margin-top: 10px; border-radius: 4px;">python update-library.py</code>
                `);
            }
        }

        async function fetchImagesFromBGG() {
            // Only fetch for games without thumbnails
            const gamesNeedingImages = allGames.filter(g => !g.thumbnail);
            if (gamesNeedingImages.length === 0) return;

            console.log(`Fetching images for ${gamesNeedingImages.length} games...`);

            // CORS proxies to try
            const corsProxies = [
                'https://api.allorigins.win/raw?url=',
                'https://corsproxy.io/?'
            ];

            // Fetch in batches of 20
            const batchSize = 20;
            for (let i = 0; i < gamesNeedingImages.length; i += batchSize) {
                const batch = gamesNeedingImages.slice(i, i + batchSize);
                const ids = batch.map(g => g.id).join(',');
                const bggUrl = `https://boardgamegeek.com/xmlapi2/thing?id=${ids}`;

                let success = false;
                for (const proxy of corsProxies) {
                    if (success) break;
                    try {
                        const response = await fetch(proxy + encodeURIComponent(bggUrl));
                        if (!response.ok) continue;

                        const text = await response.text();

                        // Check if BGG is still processing
                        if (text.includes('will be processed')) {
                            await new Promise(r => setTimeout(r, 2000));
                            continue;
                        }

                        const parser = new DOMParser();
                        const xml = parser.parseFromString(text, 'text/xml');

                        xml.querySelectorAll('item').forEach(item => {
                            const id = item.getAttribute('id');
                            const game = allGames.find(g => g.id === id);
                            if (game) {
                                const thumb = item.querySelector('thumbnail');
                                const img = item.querySelector('image');
                                if (thumb) game.thumbnail = thumb.textContent;
                                if (img) game.image = img.textContent;

                                // Get categories if missing
                                if (!game.categories || game.categories.length === 0) {
                                    game.categories = [];
                                    item.querySelectorAll('link[type="boardgamecategory"]').forEach(cat => {
                                        game.categories.push(cat.getAttribute('value'));
                                    });
                                }
                            }
                        });

                        success = true;
                        // Re-render to show new images
                        renderGameGrid();
                        renderCategoryFilters();

                    } catch (e) {
                        console.warn(`Proxy failed:`, e.message);
                    }
                }

                // Small delay between batches
                await new Promise(r => setTimeout(r, 1500));
            }
            console.log('Done fetching images');
        }

        function populateFilters() {
            // Filters are now static, no dynamic population needed
        }

        function renderGames() {
            applyFilters();
            renderCategoryFilters();
        }

        function renderCategoryFilters() {
            const categoryCount = {};
            allGames.forEach(game => {
                (game.categories || []).forEach(cat => {
                    categoryCount[cat] = (categoryCount[cat] || 0) + 1;
                });
            });

            // Sort by count and take top categories
            const topCategories = Object.entries(categoryCount)
                .sort((a, b) => b[1] - a[1])
                .slice(0, 12)
                .map(([cat]) => cat);

            const container = document.getElementById('categoryFilters');
            container.innerHTML = topCategories.map(cat => `
                <span class="filter-tag ${selectedCategories.has(cat) ? 'active' : ''}"
                      onclick="toggleCategory('${cat.replace(/'/g, "\\'")}')">${cat}</span>
            `).join('');
        }

        function toggleCategory(category) {
            if (selectedCategories.has(category)) {
                selectedCategories.delete(category);
            } else {
                selectedCategories.add(category);
            }
            renderCategoryFilters();
            applyFilters();
        }

        function applyFilters() {
            const search = document.getElementById('search').value.toLowerCase();
            const players = document.getElementById('players').value;
            const playtime = document.getElementById('playtime').value;
            const sort = document.getElementById('sort').value;

            filteredGames = allGames.filter(game => {
                // Search filter
                if (search && !game.name.toLowerCase().includes(search)) {
                    return false;
                }

                // Player count filter
                if (players) {
                    const p = parseInt(players);
                    if (p === 12) {
                        if (game.maxPlayers < 12) return false;
                    } else {
                        if (p < game.minPlayers || p > game.maxPlayers) return false;
                    }
                }

                // Play time filter
                if (playtime) {
                    const t = parseInt(playtime);
                    const gameTime = game.playingTime || 0;
                    if (t === 30 && gameTime >= 30) return false;
                    if (t === 60 && (gameTime < 30 || gameTime > 60)) return false;
                    if (t === 120 && (gameTime < 60 || gameTime > 120)) return false;
                    if (t === 999 && gameTime <= 120) return false;
                }


                // Category filter
                if (selectedCategories.size > 0) {
                    const gameCategories = new Set(game.categories || []);
                    let hasCategory = false;
                    for (const cat of selectedCategories) {
                        if (gameCategories.has(cat)) {
                            hasCategory = true;
                            break;
                        }
                    }
                    if (!hasCategory) return false;
                }

                return true;
            });

            // Sort
            filteredGames.sort((a, b) => {
                switch (sort) {
                    case 'name':
                        return a.name.localeCompare(b.name);
                    case 'name-desc':
                        return b.name.localeCompare(a.name);
                    case 'rating':
                        return (b.rating || 0) - (a.rating || 0);
                    case 'year':
                        return (parseInt(b.yearPublished) || 0) - (parseInt(a.yearPublished) || 0);
                    case 'playtime':
                        return (a.playingTime || 0) - (b.playingTime || 0);
                    case 'playtime-desc':
                        return (b.playingTime || 0) - (a.playingTime || 0);
                    default:
                        return 0;
                }
            });

            renderGameGrid();
            updateCounts();
        }

        function renderGameGrid() {
            const grid = document.getElementById('gamesGrid');
            const noResults = document.getElementById('noResults');

            if (filteredGames.length === 0) {
                grid.innerHTML = '';
                noResults.classList.remove('hidden');
                return;
            }

            noResults.classList.add('hidden');

            grid.innerHTML = filteredGames.map(game => {
                const playerText = game.minPlayers === game.maxPlayers
                    ? `${game.minPlayers}`
                    : `${game.minPlayers}-${game.maxPlayers}`;

                return `
                    <div class="game-card" onclick="showGameDetail('${game.id}')" style="cursor: pointer;">
                        <img class="game-image"
                             src="${game.image || game.thumbnail || ''}"
                             alt="${escapeHtml(game.name)}"
                             loading="lazy"
                             onerror="this.style.opacity='0'">
                        <div class="game-info">
                            <h3 class="game-title">${escapeHtml(game.name)}</h3>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function updateCounts() {
            document.getElementById('visibleCount').textContent = filteredGames.length;
            document.getElementById('totalCount').textContent = allGames.length;
        }

        function updateLastUpdated(timestamp) {
            const date = new Date(timestamp);
            document.getElementById('lastUpdated').textContent =
                `Library last updated: ${date.toLocaleDateString()} at ${date.toLocaleTimeString()}`;
        }

        function hideLoading() {
            document.getElementById('loadingOverlay').classList.add('hidden');
        }

        function showError(message) {
            const grid = document.getElementById('gamesGrid');
            grid.innerHTML = `<div class="error-message" style="grid-column: 1 / -1;">${message}</div>`;
        }

        function decodeHtml(text) {
            // Decode HTML entities like &#039; to actual characters
            const div = document.createElement('div');
            div.innerHTML = text;
            return div.textContent;
        }

        function escapeHtml(text) {
            // First decode any existing HTML entities, then escape for safe display
            const decoded = decodeHtml(text);
            const div = document.createElement('div');
            div.textContent = decoded;
            return div.innerHTML;
        }

        function showGameDetail(gameId) {
            const game = allGames.find(g => g.id === gameId);
            if (!game) return;

            // Set modal content
            document.getElementById('modalImage').src = game.image || game.thumbnail || '';
            document.getElementById('modalTitle').textContent = decodeHtml(game.name);

            // Build meta info
            const playerText = game.minPlayers === game.maxPlayers
                ? `${game.minPlayers}`
                : `${game.minPlayers}-${game.maxPlayers}`;

            const metaHtml = `
                <div class="modal-meta-item">
                    <span class="modal-meta-label">Players</span>
                    <span class="modal-meta-value">${playerText}</span>
                </div>
                <div class="modal-meta-item">
                    <span class="modal-meta-label">Play Time</span>
                    <span class="modal-meta-value">${game.playingTime || '?'} min</span>
                </div>
                <div class="modal-meta-item">
                    <span class="modal-meta-label">Released</span>
                    <span class="modal-meta-value">${game.yearPublished}</span>
                </div>
                ${game.rating > 0 ? `
                <div class="modal-meta-item">
                    <span class="modal-meta-label">BGG Rating</span>
                    <span class="modal-meta-value">${game.rating.toFixed(1)}</span>
                </div>
                ` : ''}
                ${game.ourComplexity ? `
                <div class="modal-meta-item">
                    <span class="modal-meta-label">Complexity</span>
                    <span class="modal-meta-value">${escapeHtml(game.ourComplexity)}</span>
                </div>
                ` : ''}
                ${game.shelfLocation ? `
                <div class="modal-meta-item">
                    <span class="modal-meta-label">Location</span>
                    <span class="modal-meta-value">${escapeHtml(game.shelfLocation)}</span>
                </div>
                ` : ''}
            `;
            document.getElementById('modalMeta').innerHTML = metaHtml;

            // Description - hidden for now
            const descEl = document.getElementById('modalDescription');
            descEl.style.display = 'none';

            // Categories
            const catEl = document.getElementById('modalCategories');
            if (game.categories && game.categories.length > 0) {
                catEl.innerHTML = game.categories.map(cat =>
                    `<span class="modal-category">${escapeHtml(cat)}</span>`
                ).join('');
                catEl.style.display = 'flex';
            } else {
                catEl.style.display = 'none';
            }

            // BGG link
            document.getElementById('modalBggLink').href = `https://boardgamegeek.com/boardgame/${game.id}`;

            // Show modal
            document.getElementById('gameModal').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeModal(event) {
            if (event && event.target !== event.currentTarget) return;
            document.getElementById('gameModal').classList.remove('active');
            document.body.style.overflow = '';
        }

        // Close modal on Escape key
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeModal();
        });

        async function fetchGameDescription(gameId) {
            const corsProxies = [
                'https://api.allorigins.win/raw?url=',
                'https://corsproxy.io/?'
            ];

            const bggUrl = `https://boardgamegeek.com/xmlapi2/thing?id=${gameId}`;

            for (const proxy of corsProxies) {
                try {
                    const response = await fetch(proxy + encodeURIComponent(bggUrl));
                    if (!response.ok) continue;

                    const text = await response.text();
                    if (text.includes('will be processed')) {
                        await new Promise(r => setTimeout(r, 2000));
                        continue;
                    }

                    const parser = new DOMParser();
                    const xml = parser.parseFromString(text, 'text/xml');
                    const descEl = xml.querySelector('description');

                    if (descEl) {
                        const description = descEl.textContent;
                        // Cache it
                        const game = allGames.find(g => g.id === gameId);
                        if (game) game.description = description;

                        // Update modal if still showing this game
                        const modalDesc = document.getElementById('modalDescription');
                        if (modalDesc && document.getElementById('gameModal').classList.contains('active')) {
                            modalDesc.textContent = decodeHtml(description);
                            modalDesc.classList.remove('loading');
                        }
                    }
                    return;
                } catch (e) {
                    console.warn('Proxy failed:', e.message);
                }
            }

            // If all proxies fail, show fallback
            const modalDesc = document.getElementById('modalDescription');
            if (modalDesc) {
                modalDesc.textContent = 'Description not available. Visit BoardGameGeek for more info.';
                modalDesc.classList.remove('loading');
            }
        }
    </script>
</body>
