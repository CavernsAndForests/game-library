<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Board Game Library - Caverns and Forests</title>
    <style>
        * {
            box-sizing: border-box;
        }

        :root {
            --primary-color: #555555;
            --primary-light: #888888;
            --secondary-color: #555555;
            --background: #dddddd;
            --card-bg: #ffffff;
            --text-primary: #333333;
            --text-secondary: #666666;
            --border-color: #cccccc;
            --shadow: 0 2px 12px rgba(0,0,0,0.15);
            --accent-yellow: #fffde9;
        }

        @import url('https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;500;600;700&display=swap');

        @font-face {
            font-family: 'SemplicitaPro';
            src: url('https://www.cavernsandforests.com/uploads/b/67d46cec54790b5816eff037d8c7a2defb670e121c0380bff20ea2e8bf219801/SemplicitaPro-Bold_1700172579.otf') format('opentype');
            font-weight: 700;
        }

        @font-face {
            font-family: 'SemplicitaPro';
            src: url('https://www.cavernsandforests.com/uploads/b/67d46cec54790b5816eff037d8c7a2defb670e121c0380bff20ea2e8bf219801/SemplicitaPro-Light_1700172605.otf') format('opentype');
            font-weight: 300;
        }

        body {
            font-family: 'Work Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            font-weight: 500;
            background: var(--background);
            color: var(--text-primary);
            margin: 0;
            padding: 20px;
            line-height: 1.6;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        header h1 {
            font-family: 'SemplicitaPro', sans-serif;
            color: #4d4d4d;
            margin: 0 0 8px 0;
            font-size: 2.4em;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.28em;
        }

        header p {
            font-family: 'Work Sans', sans-serif;
            color: var(--text-secondary);
            margin: 0;
            font-size: 0.9em;
            font-weight: 500;
            line-height: 1.6;
        }

        /* Collapsible controls */
        .controls-toggle {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--card-bg);
            padding: 12px 20px;
            border-radius: 8px;
            box-shadow: var(--shadow);
            margin-bottom: 0;
            border: 1px solid var(--border-color);
            cursor: pointer;
            transition: border-radius 0.2s;
        }

        .controls-toggle.open {
            border-radius: 8px 8px 0 0;
            border-bottom: none;
        }

        .controls-toggle:not(.open) {
            margin-bottom: 25px;
        }

        .controls-toggle-label {
            font-size: 0.95em;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .controls-toggle-arrow {
            font-size: 0.8em;
            color: var(--text-secondary);
            transition: transform 0.2s;
        }

        .controls-toggle.open .controls-toggle-arrow {
            transform: rotate(180deg);
        }

        .controls {
            background: var(--card-bg);
            padding: 0 20px 20px 20px;
            border-radius: 0 0 8px 8px;
            box-shadow: var(--shadow);
            margin-bottom: 25px;
            border: 1px solid var(--border-color);
            border-top: none;
            display: none;
        }

        .controls.open {
            display: block;
        }

        .controls-row {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-items: flex-end;
        }

        .control-group {
            flex: 1;
            min-width: 150px;
        }

        .control-group label {
            display: block;
            font-size: 0.85em;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .control-group input,
        .control-group select {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 1em;
            transition: border-color 0.2s;
            background: var(--card-bg);
            color: var(--text-primary);
            font-family: inherit;
        }

        .control-group input::placeholder {
            color: var(--text-secondary);
        }

        .control-group input:focus,
        .control-group select:focus {
            outline: none;
            border-color: var(--primary-light);
        }

        .filter-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid var(--border-color);
        }

        .filter-tags:empty {
            display: none;
        }

        .filter-tag {
            background: var(--card-bg);
            color: var(--text-primary);
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 0.85em;
            cursor: pointer;
            transition: background 0.2s, color 0.2s;
            border: 1px solid var(--border-color);
        }

        .filter-tag:hover {
            background: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
        }

        .filter-tag.active {
            background: var(--primary-color);
            color: white;
            font-weight: 600;
            border-color: var(--primary-color);
        }

        .stats-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .game-count {
            font-size: 1.1em;
            color: var(--text-secondary);
        }

        .game-count strong {
            color: var(--primary-color);
        }

        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 16px;
        }

        .game-card {
            position: relative;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: var(--shadow);
            transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
            aspect-ratio: 1 / 1;
            background: #1a1a1a;
        }

        .game-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 30px rgba(0,0,0,0.3);
        }

        .game-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            top: 0;
            left: 0;
        }

        .game-info {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 30px 10px 8px 10px;
            background: linear-gradient(to top, rgba(20,20,20,0.92) 0%, rgba(20,20,20,0.7) 70%, transparent 100%);
            color: white;
        }

        .game-title {
            font-size: 0.85em;
            font-weight: 600;
            margin: 0;
            color: white;
            line-height: 1.2;
            overflow: hidden;
            text-overflow: ellipsis;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
        }

        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(221,221,221,0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .hidden {
            display: none !important;
        }

        /* Game detail - inline layout */
        .modal-overlay {
            display: none;
            padding: 10px 0;
        }

        .modal-overlay.active {
            display: block;
        }

        .modal-back {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: #333;
            color: #fff;
            border: none;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.95em;
            font-weight: 600;
            padding: 10px 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .modal-back:hover {
            background: #555;
        }

        .modal-content {
            display: flex;
            flex-direction: row;
            gap: 30px;
        }

        .modal-image-wrap {
            flex: 0 0 280px;
        }

        .modal-image {
            width: 100%;
            border-radius: 12px;
            object-fit: contain;
        }

        .modal-body {
            flex: 1;
            min-width: 0;
        }

        .modal-title {
            font-family: 'SemplicitaPro', sans-serif;
            font-size: 1.6em;
            font-weight: 700;
            margin: 0 0 14px 0;
            color: var(--text-primary);
            line-height: 1.3;
        }

        .modal-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 14px;
            padding-bottom: 14px;
            border-bottom: 1px solid var(--border-color);
        }

        .modal-meta-item {
            display: flex;
            flex-direction: column;
        }

        .modal-meta-label {
            font-size: 0.7em;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .modal-meta-value {
            font-size: 1em;
            font-weight: 600;
            color: var(--text-primary);
        }

        .modal-description {
            color: var(--text-secondary);
            line-height: 1.6;
            margin-bottom: 12px;
            font-size: 0.9em;
        }

        .modal-description.collapsed {
            max-height: 4.8em;
            overflow: hidden;
        }


        .modal-toggle-desc {
            width: 100%;
            border: none;
            background: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 0;
            margin: -4px 0 12px 0;
            color: var(--text-secondary);
        }

        .modal-toggle-desc::before,
        .modal-toggle-desc::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border-color);
        }

        .modal-toggle-desc .toggle-icon {
            font-size: 0.75em;
            transition: transform 0.2s;
            line-height: 1;
        }

        .modal-toggle-desc.expanded .toggle-icon {
            transform: rotate(180deg);
        }

        .modal-toggle-desc:hover {
            color: var(--text-primary);
        }

        .modal-toggle-desc:hover::before,
        .modal-toggle-desc:hover::after {
            background: var(--text-secondary);
        }

        .modal-expansion-banner {
            background: #c62828;
            color: white;
            padding: 8px 14px;
            border-radius: 6px;
            font-size: 0.85em;
            margin-bottom: 12px;
            line-height: 1.5;
        }

        .modal-expansion-banner a {
            color: white;
            font-weight: 700;
            text-decoration: underline;
            text-underline-offset: 2px;
            cursor: pointer;
        }

        .modal-expansion-banner a:hover {
            text-decoration-thickness: 2px;
        }

        .modal-section {
            margin-bottom: 10px;
        }

        .modal-section-label {
            font-size: 0.7em;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 3px;
        }

        .modal-section-value {
            color: var(--text-primary);
            line-height: 1.4;
            font-size: 0.9em;
        }

        .modal-honors {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
        }

        .modal-honor {
            background: var(--accent-yellow);
            color: #7a6b00;
            padding: 3px 8px;
            border-radius: 5px;
            font-size: 0.75em;
            font-weight: 500;
            border: 1px solid #e8dfa0;
        }

        .modal-categories {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
        }

        .modal-category {
            background: var(--primary-color);
            color: white;
            padding: 3px 10px;
            border-radius: 6px;
            font-size: 0.8em;
        }

        .modal-bgg-link {
            display: inline-block;
            margin-top: 14px;
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 500;
            font-size: 0.9em;
        }

        .modal-bgg-link:hover {
            text-decoration: underline;
        }

        .loading-overlay.hidden {
            display: none;
        }

        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid var(--border-color);
            border-top-color: var(--primary-light);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            margin-top: 20px;
            font-size: 1.1em;
            color: var(--secondary-color);
        }

        .error-message {
            background: rgba(198, 40, 40, 0.2);
            color: #ff8a80;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            margin: 40px 0;
            border: 1px solid rgba(198, 40, 40, 0.3);
        }

        .no-results {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }

        .no-results h3 {
            margin: 0 0 10px 0;
            color: var(--text-primary);
        }

        .last-updated {
            text-align: center;
            font-size: 0.85em;
            color: var(--text-secondary);
            margin-top: 30px;
        }

        /* Mobile: stack modal vertically, compact cards */
        @media (max-width: 600px) {
            body {
                padding: 15px;
            }

            header h1 {
                font-size: 1.6em;
            }

            .controls.open {
                padding: 0 15px 15px 15px;
            }

            .control-group {
                min-width: 100%;
            }

            .games-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 12px;
            }

            .game-card {
                aspect-ratio: 1 / 1;
                border-radius: 10px;
            }

            .game-title {
                font-size: 0.75em;
            }

            .modal-content {
                flex-direction: column;
                gap: 20px;
            }

            .modal-image-wrap {
                flex: none;
            }

            .modal-title {
                font-size: 1.3em;
            }
        }
    </style>
</head>
<body>
    <div class="container">

        <header>
            <h1>Our Library</h1>
            <p>Browse our collection and find your next adventure!</p>
        </header>

        <div class="controls-toggle" id="controlsToggle" onclick="toggleControls()">
            <span class="controls-toggle-label">Search &amp; Filters</span>
            <span class="controls-toggle-arrow">&#9660;</span>
        </div>
        <div class="controls" id="controlsPanel">
            <div class="controls-row">
                <div class="control-group" style="flex: 2;">
                    <input type="text" id="search" placeholder="Search by title..." style="margin-top: 22px;">
                </div>
                <div class="control-group">
                    <label for="players">Players</label>
                    <select id="players">
                        <option value="">Any</option>
                        <option value="1">1</option>
                        <option value="2">2</option>
                        <option value="3">3</option>
                        <option value="4">4</option>
                        <option value="5">5</option>
                        <option value="6">6</option>
                        <option value="7">7</option>
                        <option value="8">8</option>
                        <option value="9">9</option>
                        <option value="10">10</option>
                        <option value="11">11</option>
                        <option value="12">12+</option>
                    </select>
                </div>
                <div class="control-group">
                    <label for="playtime">Play Time</label>
                    <select id="playtime">
                        <option value="">Any</option>
                        <option value="30">Under 30 min</option>
                        <option value="60">30-60 min</option>
                        <option value="120">1-2 hours</option>
                        <option value="999">2+ hours</option>
                    </select>
                </div>
                <div class="control-group">
                    <label for="sort">Sort By</label>
                    <select id="sort">
                        <option value="name">Name (A-Z)</option>
                        <option value="name-desc">Name (Z-A)</option>
                        <option value="year">Newest First</option>
                        <option value="playtime">Shortest First</option>
                        <option value="playtime-desc">Longest First</option>
                        <option value="age">Youngest First</option>
                        <option value="age-desc">Oldest First</option>
                    </select>
                </div>
                <div class="control-group" style="flex: 0; min-width: auto;">
                    <label>&nbsp;</label>
                    <button onclick="resetFilters()" style="padding: 10px 20px; border: none; border-radius: 8px; background: #333; color: #fff; font-family: inherit; font-size: 1em; cursor: pointer;">Reset</button>
                </div>
            </div>
            <div class="filter-tags" id="categoryFilters"></div>
        </div>

        <div class="stats-bar">
            <div class="game-count">
                Showing <strong id="visibleCount">0</strong> of <strong id="totalCount">0</strong> games
            </div>
        </div>

        <div class="games-grid" id="gamesGrid"></div>

        <div class="no-results hidden" id="noResults">
            <h3>No games found</h3>
            <p>Try adjusting your filters or search term.</p>
        </div>


        <div class="modal-overlay" id="gameModal">
            <button class="modal-back" onclick="closeModal()">&#8592; Back to library</button>
            <div class="modal-content">
            <div class="modal-image-wrap">
                <img class="modal-image" id="modalImage" src="" alt="">
            </div>
            <div class="modal-body">
                <h2 class="modal-title" id="modalTitle"></h2>
                <div id="modalExpansionInfo"></div>
                <div class="modal-meta" id="modalMeta"></div>
                <div id="modalDetails"></div>
                <p class="modal-description" id="modalDescription"></p>
                <div class="modal-categories" id="modalCategories"></div>
                <div class="modal-honors hidden" id="modalHonors" style="margin-top: 10px;"></div>
            </div>
            </div>
        </div>
    </div>

    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-spinner"></div>
        <p class="loading-text">Loading game library...</p>
    </div>

    <script>
        let allGames = [];
        let filteredGames = [];
        let selectedCategories = new Set();

        // Initialize the application
        document.addEventListener('DOMContentLoaded', () => {
            loadLibrary();
            setupEventListeners();
            // Open filters by default on desktop, collapsed on mobile
            if (window.innerWidth > 600) {
                toggleControls();
            }
        });

        function toggleControls() {
            const toggle = document.getElementById('controlsToggle');
            const panel = document.getElementById('controlsPanel');
            toggle.classList.toggle('open');
            panel.classList.toggle('open');
        }

        function resetFilters() {
            document.getElementById('search').value = '';
            document.getElementById('players').value = '';
            document.getElementById('playtime').value = '';
            document.getElementById('sort').value = 'name';
            selectedCategories.clear();
            renderCategoryFilters();
            applyFilters();
        }

        function setupEventListeners() {
            document.getElementById('search').addEventListener('input', debounce(applyFilters, 300));
            document.getElementById('players').addEventListener('change', applyFilters);
            document.getElementById('playtime').addEventListener('change', applyFilters);
            document.getElementById('sort').addEventListener('change', applyFilters);
        }

        function debounce(func, wait) {
            let timeout;
            return function executedFunction(...args) {
                const later = () => {
                    clearTimeout(timeout);
                    func(...args);
                };
                clearTimeout(timeout);
                timeout = setTimeout(later, wait);
            };
        }

        async function loadLibrary() {
            try {
                const response = await fetch('games.json');
                if (!response.ok) {
                    throw new Error('games.json not found');
                }
                const data = await response.json();
                allGames = data.games;

                populateFilters();
                renderGames();
                hideLoading();
            } catch (error) {
                console.error('Error loading library:', error);
                hideLoading();
                showError(`
                    <strong>Game library not found.</strong><br><br>
                    Run this command to generate it:<br>
                    <code style="background: #f5f5f5; padding: 10px; display: block; margin-top: 10px; border-radius: 4px;">python update-library.py</code>
                `);
            }
        }

        function populateFilters() {
            // Filters are now static, no dynamic population needed
        }

        function renderGames() {
            applyFilters();
            renderCategoryFilters();
        }

        function renderCategoryFilters() {
            const categoryCount = {};
            allGames.forEach(game => {
                (game.categories || []).forEach(cat => {
                    categoryCount[cat] = (categoryCount[cat] || 0) + 1;
                });
            });

            // Sort by count and take top categories
            const topCategories = Object.entries(categoryCount)
                .sort((a, b) => b[1] - a[1])
                .slice(0, 12)
                .map(([cat]) => cat);

            const container = document.getElementById('categoryFilters');
            container.innerHTML = topCategories.map(cat => `
                <span class="filter-tag ${selectedCategories.has(cat) ? 'active' : ''}"
                      onclick="toggleCategory('${cat.replace(/'/g, "\\'")}')">${cat}</span>
            `).join('');
        }

        function toggleCategory(category) {
            if (selectedCategories.has(category)) {
                selectedCategories.delete(category);
            } else {
                selectedCategories.add(category);
            }
            renderCategoryFilters();
            applyFilters();
        }

        function applyFilters() {
            const search = document.getElementById('search').value.toLowerCase();
            const players = document.getElementById('players').value;
            const playtime = document.getElementById('playtime').value;
            const sort = document.getElementById('sort').value;

            filteredGames = allGames.filter(game => {
                // Search filter
                if (search && !game.name.toLowerCase().includes(search)) {
                    return false;
                }

                // Player count filter
                if (players) {
                    const p = parseInt(players);
                    if (p === 12) {
                        if (game.maxPlayers < 12) return false;
                    } else {
                        if (p < game.minPlayers || p > game.maxPlayers) return false;
                    }
                }

                // Play time filter
                if (playtime) {
                    const t = parseInt(playtime);
                    const gameTime = game.playingTime || 0;
                    if (t === 30 && gameTime >= 30) return false;
                    if (t === 60 && (gameTime < 30 || gameTime > 60)) return false;
                    if (t === 120 && (gameTime < 60 || gameTime > 120)) return false;
                    if (t === 999 && gameTime <= 120) return false;
                }

                // Category filter
                if (selectedCategories.size > 0) {
                    const gameCategories = new Set(game.categories || []);
                    let hasCategory = false;
                    for (const cat of selectedCategories) {
                        if (gameCategories.has(cat)) {
                            hasCategory = true;
                            break;
                        }
                    }
                    if (!hasCategory) return false;
                }

                return true;
            });

            // Sort
            filteredGames.sort((a, b) => {
                switch (sort) {
                    case 'name':
                        return a.name.localeCompare(b.name);
                    case 'name-desc':
                        return b.name.localeCompare(a.name);
                    case 'year':
                        return (parseInt(b.yearPublished) || 0) - (parseInt(a.yearPublished) || 0);
                    case 'playtime':
                        return (a.playingTime || 0) - (b.playingTime || 0);
                    case 'playtime-desc':
                        return (b.playingTime || 0) - (a.playingTime || 0);
                    case 'age':
                        return (a.minAge || 0) - (b.minAge || 0);
                    case 'age-desc':
                        return (b.minAge || 0) - (a.minAge || 0);
                    default:
                        return 0;
                }
            });

            renderGameGrid();
            updateCounts();
        }

        function renderGameGrid() {
            const grid = document.getElementById('gamesGrid');
            const noResults = document.getElementById('noResults');

            if (filteredGames.length === 0) {
                grid.innerHTML = '';
                noResults.classList.remove('hidden');
                return;
            }

            noResults.classList.add('hidden');

            grid.innerHTML = filteredGames.map(game => {
                return `
                    <div class="game-card" onclick="showGameDetail('${game.id}')" style="cursor: pointer;">
                        <img class="game-image"
                             src="${getTileImage(game.image || game.thumbnail)}"
                             alt="${escapeHtml(game.name)}"
                             loading="lazy"
                             onerror="this.style.opacity='0'">
                        <div class="game-info">
                            <h3 class="game-title">${escapeHtml(game.name)}</h3>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function updateCounts() {
            document.getElementById('visibleCount').textContent = filteredGames.length;
            document.getElementById('totalCount').textContent = allGames.length;
        }

        function updateLastUpdated(timestamp) {
            const date = new Date(timestamp);
            document.getElementById('lastUpdated').textContent =
                `Library last updated: ${date.toLocaleDateString()} at ${date.toLocaleTimeString()}`;
        }

        function hideLoading() {
            document.getElementById('loadingOverlay').classList.add('hidden');
        }

        function showError(message) {
            const grid = document.getElementById('gamesGrid');
            grid.innerHTML = `<div class="error-message" style="grid-column: 1 / -1;">${message}</div>`;
        }

        function decodeHtml(text) {
            const div = document.createElement('div');
            div.innerHTML = text;
            return div.textContent;
        }

        function escapeHtml(text) {
            const decoded = decodeHtml(text);
            const div = document.createElement('div');
            div.textContent = decoded;
            return div.innerHTML;
        }

        function getTileImage(url) {
            if (!url) return '';
            // Strip protocol for weserv proxy
            const stripped = url.replace(/^https?:\/\//, '');
            return 'https://images.weserv.nl/?url=' + encodeURIComponent(stripped) + '&w=400&h=400&fit=cover';
        }

        function showGameDetail(gameId) {
            const game = allGames.find(g => g.id === gameId);
            if (!game) return;

            // Image & title
            document.getElementById('modalImage').src = game.image || game.thumbnail || '';
            document.getElementById('modalTitle').textContent = decodeHtml(game.name);

            // Expansion banner
            const expInfoEl = document.getElementById('modalExpansionInfo');
            if (game.type === 'boardgameexpansion' && game.baseGame) {
                const inLibrary = allGames.find(g => g.id === game.baseGame.id);
                const nameHtml = inLibrary
                    ? `<a onclick="showGameDetail('${game.baseGame.id}')">${escapeHtml(game.baseGame.name)}</a>`
                    : escapeHtml(game.baseGame.name);
                expInfoEl.innerHTML = `<div class="modal-expansion-banner">This game is an expansion. It requires ${nameHtml} to play.</div>`;
            } else if (game.type === 'boardgameexpansion') {
                expInfoEl.innerHTML = `<div class="modal-expansion-banner">This game is an expansion.</div>`;
            } else {
                expInfoEl.innerHTML = '';
            }

            // Meta info row
            const playerText = game.minPlayers === game.maxPlayers
                ? `${game.minPlayers}`
                : `${game.minPlayers}-${game.maxPlayers}`;

            let metaHtml = `
                <div class="modal-meta-item">
                    <span class="modal-meta-label">Players</span>
                    <span class="modal-meta-value">${playerText}</span>
                </div>
                <div class="modal-meta-item">
                    <span class="modal-meta-label">Play Time</span>
                    <span class="modal-meta-value">${game.playingTime || '?'} min</span>
                </div>
                <div class="modal-meta-item">
                    <span class="modal-meta-label">Released</span>
                    <span class="modal-meta-value">${game.yearPublished}</span>
                </div>
            `;
            if (game.minAge > 0) {
                metaHtml += `
                <div class="modal-meta-item">
                    <span class="modal-meta-label">Ages</span>
                    <span class="modal-meta-value">${game.minAge}+</span>
                </div>`;
            }
            if (game.ourComplexity) {
                metaHtml += `
                <div class="modal-meta-item">
                    <span class="modal-meta-label">Complexity</span>
                    <span class="modal-meta-value">${escapeHtml(game.ourComplexity)}</span>
                </div>`;
            }
            if (game.shelfLocation) {
                metaHtml += `
                <div class="modal-meta-item">
                    <span class="modal-meta-label">Location</span>
                    <span class="modal-meta-value">${escapeHtml(game.shelfLocation)}</span>
                </div>`;
            }
            document.getElementById('modalMeta').innerHTML = metaHtml;

            // Description
            const descEl = document.getElementById('modalDescription');
            if (game.description) {
                descEl.textContent = game.description;
                descEl.style.display = '';
            } else {
                descEl.style.display = 'none';
            }

            // Detail sections: Description, Mechanics, Language, Designer, Artist, Publisher
            let detailsHtml = '';

            if (game.mechanics && game.mechanics.length > 0) {
                const shown = game.mechanics.slice(0, 3).map(m => escapeHtml(m)).join(', ');
                detailsHtml += `
                <div class="modal-section">
                    <div class="modal-section-label">Mechanics</div>
                    <div class="modal-section-value">${shown}</div>
                </div>`;
            }
            if (game.languageDependence) {
                detailsHtml += `
                <div class="modal-section">
                    <div class="modal-section-label">Language Dependence</div>
                    <div class="modal-section-value">${escapeHtml(game.languageDependence)}</div>
                </div>`;
            }
            if (game.designers && game.designers.length > 0) {
                const shown = game.designers.slice(0, 3).map(d => escapeHtml(d)).join(', ');
                const suffix = game.designers.length > 3 ? ' et al.' : '';
                detailsHtml += `
                <div class="modal-section">
                    <div class="modal-section-label">Designer${game.designers.length > 1 ? 's' : ''}</div>
                    <div class="modal-section-value">${shown}${suffix}</div>
                </div>`;
            }
            if (game.artists && game.artists.length > 0) {
                const shown = game.artists.slice(0, 3).map(a => escapeHtml(a)).join(', ');
                const suffix = game.artists.length > 3 ? ' et al.' : '';
                detailsHtml += `
                <div class="modal-section">
                    <div class="modal-section-label">Artist${game.artists.length > 1 ? 's' : ''}</div>
                    <div class="modal-section-value">${shown}${suffix}</div>
                </div>`;
            }
            if (game.publishers && game.publishers.length > 0 && game.publishers.length <= 2) {
                detailsHtml += `
                <div class="modal-section">
                    <div class="modal-section-label">Publisher${game.publishers.length > 1 ? 's' : ''}</div>
                    <div class="modal-section-value">${game.publishers.map(p => escapeHtml(p)).join(', ')}</div>
                </div>`;
            }

            document.getElementById('modalDetails').innerHTML = detailsHtml;

            // Categories hidden
            document.getElementById('modalCategories').style.display = 'none';

            // Awards & Honors
            const honorsEl = document.getElementById('modalHonors');
            if (game.honors && game.honors.length > 0) {
                honorsEl.innerHTML = game.honors.map(h =>
                    `<span class="modal-honor">${escapeHtml(h)}</span>`
                ).join('');
                honorsEl.classList.remove('hidden');
            } else {
                honorsEl.classList.add('hidden');
            }

            // Show modal inline — hide grid, filters, show detail
            document.getElementById('gamesGrid').style.display = 'none';
            document.querySelector('.stats-bar').style.display = 'none';
            document.getElementById('controlsToggle').style.display = 'none';
            document.getElementById('controlsPanel').style.display = 'none';
            document.getElementById('gameModal').classList.add('active');
            window.scrollTo(0, 0);
            window.parent.postMessage({ type: 'scroll-to-iframe' }, '*');
            requestAnimationFrame(postHeight);
        }

        function toggleDescription() {
            const descEl = document.getElementById('modalDescription');
            const toggleBtn = document.getElementById('modalToggleDesc');
            if (descEl.classList.contains('collapsed')) {
                descEl.classList.remove('collapsed');
                toggleBtn.classList.add('expanded');
            } else {
                descEl.classList.add('collapsed');
                toggleBtn.classList.remove('expanded');
            }
        }

        function closeModal() {
            document.getElementById('gameModal').classList.remove('active');
            document.getElementById('gamesGrid').style.display = '';
            document.querySelector('.stats-bar').style.display = '';
            document.getElementById('controlsToggle').style.display = '';
            document.getElementById('controlsPanel').style.display = '';
            requestAnimationFrame(postHeight);
        }

        // Close modal on Escape key
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeModal();
        });

        // Auto-resize iframe: post content height to parent window
        let heightRAF = null;
        function postHeight() {
            if (heightRAF) cancelAnimationFrame(heightRAF);
            heightRAF = requestAnimationFrame(() => {
                // Measure actual content height, not iframe/document height
                const container = document.querySelector('.container');
                const height = container ? container.offsetHeight + 40 : document.body.scrollHeight;
                window.parent.postMessage({ type: 'resize-iframe', height: height }, '*');
            });
        }
        // Post height after load, after renders, and on resize
        window.addEventListener('load', postHeight);
        window.addEventListener('resize', postHeight);
        // Observe DOM changes (game grid re-renders, filters, etc.)
        new MutationObserver(postHeight).observe(document.body, { childList: true, subtree: true });

    </script>
</body>
</html>
